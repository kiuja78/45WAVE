    result.push({type:'자녀', name:c.name, birth:c.birth || '', gender:c.gender || '', photo:c.photo || '', team:m.team || '', phone:'', photoUrl:''});
  });
  return result;
}

function shouldShowChildrenInList(m){
  if(!m) return false;
  const owner = childOwnerFor(m);
  if(!owner || String(owner.id) !== String(m.id)) return false;
  return childrenForDisplay(m).length > 0;
}





/* V5.63 FINAL spouse/family link patch
   핵심 수정:
   - 정보창/정보수정 화면 모두 같은 findSpouseFor() 결과를 사용한다.
   - 배우자명 컬럼이 프론트 데이터에 들어오면 그것만 최우선 사용한다.
   - 배우자명 컬럼이 프론트 데이터에 누락된 경우를 대비해, 기존 확정쌍/인접쌍 fallback을 마지막에만 사용한다.
   - 아내 행에서도 남편 정보와 남편 행 자녀를 함께 보여준다.
*/
function v553CanonicalMemberName(m){
  return canonicalPersonName(memberNameOf(m) || (m && (m.name || m['이름'] || m.memberName)) || '');
}

function v553MemberLabel(m){
  return cleanCellText(memberNameOf(m) || (m && (m.name || m['이름'] || m.memberName)) || '');
}

function v553SameTeam(a,b){
  const at = memberTeamOf(a) || (a && a.team) || '';
  const bt = memberTeamOf(b) || (b && b.team) || '';
  return !at || !bt || String(at) === String(bt);
}

function v553DirectSpouseNames(m){
  const out = [];
  const add = (v) => {
    const name = extractFirstNameText(v);
    if(looksLikePersonName(name)) out.push(name);
  };
  if(!m || typeof m !== 'object') return out;

  const aliases = [
    '배우자명','배우자 이름','배우자이름','배우자성명','배우자 성명','배우자성함','배우자 성함','배우자',
    '남편명','남편 이름','남편이름','남편성명','남편 성명','남편성함','남편 성함','남편',
    '아내명','아내 이름','아내이름','아내성명','아내 성명','아내성함','아내 성함','아내',
    '부인명','부인 이름','부인이름','부인성명','부인 성명','부인',
    '처명','처 이름','처이름','처',
    'spouseName','spouse_name','spouse','partnerName','partner_name','partner',
    'husbandName','husband_name','husband','wifeName','wife_name','wife'
  ];
  aliases.forEach(k => add(fieldValueOf(m, k)));

  const seenObj = new Set();
  const scan = (obj, depth=0) => {
    if(!obj || typeof obj !== 'object' || depth > 6 || seenObj.has(obj)) return;
    seenObj.add(obj);
    if(Array.isArray(obj)){ obj.forEach(x => scan(x, depth+1)); return; }
    Object.keys(obj).forEach(k => {
      const ck = compactFieldKey(k);
      const isSpouseKey = ck.includes('배우자') || ck.includes('남편') || ck.includes('아내') || ck.includes('부인') || ck === '처' || ck.includes('spouse') || ck.includes('partner') || ck.includes('husband') || ck.includes('wife');
      const isBad = ck.includes('사진') || ck.includes('photo') || ck.includes('전화') || ck.includes('연락') || ck.includes('phone') || ck.includes('생년') || ck.includes('birth') || ck.includes('주소') || ck.includes('address') || ck.includes('자녀') || ck.includes('child') || ck.includes('성별') || ck.includes('gender');
      const v = obj[k];
      if(isSpouseKey && !isBad){
        if(v && typeof v === 'object') add(fieldValueOf(v, ['name','이름','성명','성함','memberName']));
        else add(v);
      }
      if(v && typeof v === 'object') scan(v, depth+1);
    });
  };
  scan(m);

  const mine = v553CanonicalMemberName(m);
  const seen = {};
  return out.filter(x => {
    const n = canonicalPersonName(x);
    if(!n || n === mine || seen[n]) return false;
    seen[n] = true;
    return true;
  });
}

function declaredSpouseNameOf(m){
  const list = v553DirectSpouseNames(m);
  return list[0] || '';
}
function spouseNameOf(m){ return declaredSpouseNameOf(m); }

function v553ManualPairs(){
  return {
    '김진태':'정미숙', '정미숙':'김진태',
    '김건일':'문에스더', '문에스더':'김건일',
    '박성철':'문서현', '문서현':'박성철'
  };
}
function v553ManualSpouseName(m){
  const n = v553CanonicalMemberName(m);
  return v553ManualPairs()[n] || '';
}

function v553AnyExplicitSpouseData(){
  return safeArr(DATA.members).some(m => v553DirectSpouseNames(m).length > 0);
}

function v553MemberIndex(m){
  const list = safeArr(DATA.members);
  const id = String(m && m.id || '');
  const byId = id ? list.findIndex(x => String(x.id) === id) : -1;
  if(byId >= 0) return byId;
  return list.indexOf(m);
}

function v553OppositeGender(a,b){
  const ag = getGender(a), bg = getGender(b);
  return ag && bg && ag !== bg;
}

function v553SameField(a,b,aliases){
  const av = fieldValueOf(a, aliases);
  const bv = fieldValueOf(b, aliases);
  return !!av && !!bv && String(av).trim() === String(bv).trim();
}

function v553FallbackSpouseByOrder(m){
  if(!m || v553AnyExplicitSpouseData()) return null;
  const list = safeArr(DATA.members).filter(memberIsActive);
  const all = safeArr(DATA.members);
  const idx = v553MemberIndex(m);
  if(idx < 0) return null;
  const positions = [idx-1, idx+1, idx-2, idx+2].filter(i => i >= 0 && i < all.length);
  let best = null;
  let bestScore = 0;
  positions.forEach(pos => {
    const x = all[pos];
    if(!x || !memberIsActive(x) || String(x.id) === String(m.id)) return;
    if(!v553SameTeam(m,x) || !v553OppositeGender(m,x)) return;
    let score = 0;
    if(Math.abs(pos - idx) === 1) score += 30;
    else score += 12;
    if(parseChildren(m).length || parseChildren(x).length) score += 25;
    if(v553SameField(m,x,['address','주소'])) score += 25;
    if(v553SameField(m,x,['village','마을']) && v553SameField(m,x,['room','사랑방'])) score += 15;
    if(v553SameField(m,x,['phone','연락처','전화번호'])) score += 5;
    if(score > bestScore){ bestScore = score; best = x; }
  });
  return bestScore >= 30 ? best : null;
}

function v553AllSpouseCandidateNames(m){
  const out = [];
  const add = v => { const n = extractFirstNameText(v); if(looksLikePersonName(n)) out.push(n); };
  v553DirectSpouseNames(m).forEach(add);
  add(v552SpouseNameFromGlobalData ? v552SpouseNameFromGlobalData(m) : '');
  add(v553ManualSpouseName(m));
  const seen = {};
  return out.filter(v => { const n = canonicalPersonName(v); if(!n || seen[n]) return false; seen[n] = true; return true; });
}

function v553FindByName(name, team='', excludeId=''){

}

function buildFamilyLinkIndex(){
  FAMILY_LINK_BY_ID = {};
  const list = safeArr(DATA.members).filter(memberIsActive);

  // 1) 배우자명/남편명/아내명 등 명시 컬럼 우선
  list.forEach(m => {
    for(const spouseName of v553AllSpouseCandidateNames(m)){
      const spouse = v553FindByName(spouseName, memberTeamOf(m), m.id);
      if(spouse){ linkSpouses(m, spouse); break; }
    }
  });

  // 2) 역방향 보강: 한쪽에만 배우자명이 있어도 반대쪽 정보창에 표시
  list.forEach(m => {
    if(FAMILY_LINK_BY_ID[String(m.id)]) return;
    const mine = v553CanonicalMemberName(m);
    if(!mine) return;
    const reverse = list.find(x => String(x.id) !== String(m.id) && v553SameTeam(x,m) && v553AllSpouseCandidateNames(x).some(n => canonicalPersonName(n) === mine)) ||
                    list.find(x => String(x.id) !== String(m.id) && v553AllSpouseCandidateNames(x).some(n => canonicalPersonName(n) === mine));
    if(reverse) linkSpouses(m, reverse);
  });

  // 3) 배우자명 컬럼이 프론트 데이터에 아예 안 들어온 경우만 제한적 fallback
  if(!v553AnyExplicitSpouseData()){
    list.forEach(m => {
      if(FAMILY_LINK_BY_ID[String(m.id)]) return;
      const fb = v553FallbackSpouseByOrder(m);
      if(fb && !FAMILY_LINK_BY_ID[String(fb.id)]) linkSpouses(m, fb);
    });
  }

  DATA.__familyLinksReady = true;
}

function normalizeFamilyLinks(){
  safeArr(DATA.members).forEach(m => {
    if(!m) return;
    m.name = memberNameOf(m) || m.name || '';
    m.team = memberTeamOf(m) || m.team || '';
    m.gender = memberGenderOf(m) || m.gender || '';
    m.birth = memberBirthOf(m) || m.birth || '';
    const declared = declaredSpouseNameOf(m) || (typeof v552SpouseNameFromGlobalData === 'function' ? v552SpouseNameFromGlobalData(m) : '') || v553ManualSpouseName(m);
    if(declared) setSpouseNameFields(m, declared);
  });
  buildFamilyLinkIndex();
  safeArr(DATA.members).forEach(m => {
    const spouse = FAMILY_LINK_BY_ID[String(m.id)];
    if(spouse) setSpouseNameFields(m, v553MemberLabel(spouse));
  });
}

function v553EnsureFamilyLinks(){
  if(!DATA || !Array.isArray(DATA.members)) return;
  if(!DATA.__familyLinksReady) normalizeFamilyLinks();
}

function findSpouseFor(m){
  if(!m) return null;
  v553EnsureFamilyLinks();
  const linked = FAMILY_LINK_BY_ID && FAMILY_LINK_BY_ID[String(m.id)];

  for(const spouseName of v553AllSpouseCandidateNames(m)){
    const direct = v553FindByName(spouseName, memberTeamOf(m), m.id);

  const fb = v553FallbackSpouseByOrder(m);

}

/* V5.63 FINAL family matching repair
   - 배우자명 컬럼이 브라우저 데이터로 정상 전달되면 그 값을 최우선 사용한다.
   - 배우자명 컬럼이 브라우저 데이터에 누락된 경우에는 같은 순 안의 인접 남/여 행과 자녀/주소/연락처 신호로 가족을 복구한다.
   - 정보창/정보수정/아내 행 자녀 표시가 모두 같은 findSpouseFor() 결과를 사용한다.
*/
function v554HasOwnSpouseKey(obj){
  if(!obj || typeof obj !== 'object') return false;
  const seen = new Set();
  const scan = (o, depth=0) => {
    if(!o || typeof o !== 'object' || depth > 5 || seen.has(o)) return false;
    seen.add(o);
    if(Array.isArray(o)) return o.some(x => scan(x, depth+1));
    return Object.keys(o).some(k => {
      const ck = compactFieldKey(k);
      const isKey = ck.includes('배우자') || ck.includes('남편') || ck.includes('아내') || ck.includes('부인') || ck === '처' || ck.includes('spouse') || ck.includes('partner') || ck.includes('husband') || ck.includes('wife');
      const isBad = ck.includes('사진') || ck.includes('photo') || ck.includes('전화') || ck.includes('연락') || ck.includes('phone') || ck.includes('생년') || ck.includes('birth') || ck.includes('주소') || ck.includes('address') || ck.includes('자녀') || ck.includes('child') || ck.includes('성별') || ck.includes('gender');
      if(isKey && !isBad) return true;
      const v = o[k];
      return v && typeof v === 'object' ? scan(v, depth+1) : false;
    });
  };
  return scan(obj);
}

function v554AnySpouseKeyPresent(){
  return safeArr(DATA && DATA.members).some(v554HasOwnSpouseKey) ||
    !!(DATA && (DATA.spouseMap || DATA.spouses || DATA.spousePairs || DATA.familyPairs || DATA.familyLinks || DATA.families));
}

function v554CollectSpouseNames(m){
  const out = [];
  const add = (v) => {
    const n = extractFirstNameText(v);
    if(looksLikePersonName(n)) out.push(n);
  };
  if(!m || typeof m !== 'object') return out;
  const aliases = [
    '배우자명','배우자 이름','배우자이름','배우자성명','배우자 성명','배우자성함','배우자 성함','배우자',
    '남편명','남편 이름','남편이름','남편성명','남편 성명','남편성함','남편 성함','남편',
    '아내명','아내 이름','아내이름','아내성명','아내 성명','아내성함','아내 성함','아내',
    '부인명','부인 이름','부인이름','부인성명','부인 성명','부인',
    '처명','처 이름','처이름','처',
    'spouseName','spouse_name','spouse','partnerName','partner_name','partner',
    'husbandName','husband_name','husband','wifeName','wife_name','wife'
  ];
  aliases.forEach(k => add(fieldValueOf(m, k)));

  const seenObj = new Set();
  const scan = (obj, depth=0) => {
    if(!obj || typeof obj !== 'object' || depth > 6 || seenObj.has(obj)) return;
    seenObj.add(obj);
    if(Array.isArray(obj)){ obj.forEach(x => scan(x, depth+1)); return; }
    Object.keys(obj).forEach(k => {
      const ck = compactFieldKey(k);
      const isSpouseKey = ck.includes('배우자') || ck.includes('남편') || ck.includes('아내') || ck.includes('부인') || ck === '처' || ck.includes('spouse') || ck.includes('partner') || ck.includes('husband') || ck.includes('wife');
      const isBad = ck.includes('사진') || ck.includes('photo') || ck.includes('전화') || ck.includes('연락') || ck.includes('phone') || ck.includes('생년') || ck.includes('birth') || ck.includes('주소') || ck.includes('address') || ck.includes('자녀') || ck.includes('child') || ck.includes('성별') || ck.includes('gender');
      const v = obj[k];
      if(isSpouseKey && !isBad){
        if(v && typeof v === 'object') add(fieldValueOf(v, ['name','이름','성명','성함','memberName']));
        else add(v);
      }
      if(v && typeof v === 'object') scan(v, depth+1);
    });
  };
  scan(m);

  try{ add(typeof v552SpouseNameFromGlobalData === 'function' ? v552SpouseNameFromGlobalData(m) : ''); }catch(e){}
  try{ add(typeof v553ManualSpouseName === 'function' ? v553ManualSpouseName(m) : ''); }catch(e){}
  try{ add(typeof v552ManualSpouseName === 'function' ? v552ManualSpouseName(m) : ''); }catch(e){}

  const mine = canonicalPersonName(memberNameOf(m) || m.name || '');
  const seen = {};
  return out.filter(x => {
    const n = canonicalPersonName(x);
    if(!n || n === mine || seen[n]) return false;
    seen[n] = true;
    return true;
  });
}

function v554OrderIndex(m){

function v554SameValue(a,b,aliases){

function v554PersonLabel(m){

function v554FallbackSpouseByOrder(m){
  if(!m) return null;
  const all = safeArr(DATA && DATA.members);
  const idx = v554OrderIndex(m);
  if(idx < 0) return null;
  const mg = v554Gender(m);
  const hasAnySpouseKey = v554AnySpouseKeyPresent();
  const myChildren = parseChildren(m).length;

  const positions = [];
  for(let d=1; d<=5; d++){
    if(idx-d >= 0) positions.push(idx-d);
    if(idx+d < all.length) positions.push(idx+d);
  }

  let best = null;
  let bestScore = 0;
  positions.forEach(pos => {
    const x = all[pos];
    if(!x || !memberIsActive(x) || String(x.id) === String(m.id)) return;
    if(!v554SameTeam(m,x)) return;
    const xg = v554Gender(x);
    if(mg && xg && mg === xg) return;

    const dist = Math.abs(pos - idx);
    const xChildren = parseChildren(x).length;
    let score = 0;
    if(dist === 1) score += 60;
    else if(dist === 2) score += 36;
    else if(dist === 3) score += 22;
    else score += 10;

    if(myChildren || xChildren) score += 34;
    if(mg === '여' && xg === '남' && xChildren) score += 30;
    if(mg === '남' && xg === '여' && myChildren) score += 30;
    if(v554SameValue(m,x,['address','주소'])) score += 45;
    if(v554SameValue(m,x,['phone','연락처','전화번호'])) score += 18;
    if(v554SameValue(m,x,['village','마을']) && v554SameValue(m,x,['room','사랑방'])) score += 12;
    if(!FAMILY_LINK_BY_ID[String(x.id)]) score += 10;

    // 배우자명 계열 컬럼이 실제로 내려오는 경우에는 빈칸 개인을 지켜야 하므로 강한 가족 신호만 허용한다.
    const threshold = hasAnySpouseKey ? 82 : 55;
    if(score >= threshold && score > bestScore){
      bestScore = score;
      best = x;
    }
  });
  return best;
}

function v554LinkSpouses(a,b){

function buildFamilyLinkIndex(){
  FAMILY_LINK_BY_ID = {};
  const list = safeArr(DATA && DATA.members).filter(memberIsActive);

  // 1. 명시 배우자명/남편명/아내명 우선
  list.forEach(m => {
    if(FAMILY_LINK_BY_ID[String(m.id)]) return;
    for(const spouseName of v554CollectSpouseNames(m)){
      const spouse = v554MemberByName(spouseName, memberTeamOf(m), m.id);
      if(spouse){ v554LinkSpouses(m, spouse); break; }
    }
  });

  // 2. 역방향 보강: 상대방 행에만 배우자명이 있어도 연결
  list.forEach(m => {
    if(FAMILY_LINK_BY_ID[String(m.id)]) return;
    const mine = canonicalPersonName(v554PersonLabel(m));
    if(!mine) return;
    const reverse = list.find(x => String(x.id) !== String(m.id) && v554SameTeam(x,m) && v554CollectSpouseNames(x).some(n => canonicalPersonName(n) === mine)) ||
                    list.find(x => String(x.id) !== String(m.id) && v554CollectSpouseNames(x).some(n => canonicalPersonName(n) === mine));
    if(reverse) v554LinkSpouses(m, reverse);
  });

  // 3. 프론트 데이터에 배우자명 컬럼이 누락된 경우 대비: 같은 순 인접 행+가족 신호로 복구
  list.forEach(m => {
    if(FAMILY_LINK_BY_ID[String(m.id)]) return;
    const fb = v554FallbackSpouseByOrder(m);
    if(fb && !FAMILY_LINK_BY_ID[String(fb.id)]) v554LinkSpouses(m, fb);
  });

  DATA.__familyLinksReady = true;
}

function normalizeFamilyLinks(){
  if(!DATA || !Array.isArray(DATA.members)) return;
  DATA.__familyLinksReady = false;
  safeArr(DATA.members).forEach(m => {
    if(!m) return;
    m.name = memberNameOf(m) || m.name || '';
    m.team = memberTeamOf(m) || m.team || '';
    m.gender = memberGenderOf(m) || m.gender || '';
    m.birth = memberBirthOf(m) || m.birth || '';
  });
  buildFamilyLinkIndex();
  safeArr(DATA.members).forEach(m => {
    const spouse = FAMILY_LINK_BY_ID[String(m.id)];
    if(spouse) setSpouseNameFields(m, v554PersonLabel(spouse));
  });
}

function v554EnsureFamilyLinks(){
  if(!DATA || !Array.isArray(DATA.members)) return;
  const ids = safeArr(DATA.members).filter(memberIsActive).map(m => String(m.id));
  const linkedCount = ids.filter(id => FAMILY_LINK_BY_ID && FAMILY_LINK_BY_ID[id]).length;
  if(!DATA.__familyLinksReady || !FAMILY_LINK_BY_ID || !linkedCount) normalizeFamilyLinks();
}

function findSpouseFor(m){
  if(!m) return null;
  v554EnsureFamilyLinks();
  const linked = FAMILY_LINK_BY_ID && FAMILY_LINK_BY_ID[String(m.id)];
  if(linked && String(linked.id) !== String(m.id)) return linked;

  for(const spouseName of v554CollectSpouseNames(m)){
    const direct = v554MemberByName(spouseName, memberTeamOf(m), m.id);
    if(direct) return direct;
  }

  const fb = v554FallbackSpouseByOrder(m);
  return fb || null;
}

function compressNoticeImage(src){
  return new Promise(resolve=>{
    try{
      const img = new Image();
      img.onload = function(){
        try{
          let w = img.naturalWidth || img.width;
          let h = img.naturalHeight || img.height;
          const maxSide = 1280;
          if(w > maxSide || h > maxSide){
            const r = Math.min(maxSide / w, maxSide / h);
            w = Math.round(w * r);
            h = Math.round(h * r);
          }
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, w);
          canvas.height = Math.max(1, h);
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          let data = canvas.toDataURL('image/jpeg', 0.82);
          if(data.length > 1500000) data = canvas.toDataURL('image/jpeg', 0.68);
          if(data.length > 2300000) data = canvas.toDataURL('image/jpeg', 0.55);
          resolve(data);
        }catch(e){ resolve(src); }
      };
      img.onerror = function(){ resolve(src); };
      img.src = src;
    }catch(e){ resolve(src); }
  });
}

function handleNoticeImageFile(input){

<script>
/* V5.63 SERVER SPOUSE + FAST BUTTON PATCH
   기준: 구글시트 순원목록의 배우자명 컬럼만 사용한다.
   목적: 서버가 내려준 spouseId/spouseNameRaw를 우선 사용하고, 렌더링마다 가족매칭을 반복 재계산하지 않는다.
*/
(function(){
  const P4_CACHE_KEY = 'geolLeaderDataCacheV5_63';
  const P4_VERSION = 'V5.63';

  window.versionText = function(){ return P4_VERSION; };
  window.dataCacheKey = function(){ return P4_CACHE_KEY; };

  function p4Clean(v){
    const s = String(v == null ? '' : v).replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
    const low = s.toLowerCase();
    return (!s || s === '-' || s === '없음' || s === '무' || s === '해당없음' || low === 'null' || low === 'undefined' || low === 'nan') ? '' : s;
  }
  function p4CompactKey(k){
    return String(k || '').replace(/[\s\u00A0\u200B-\u200D\uFEFF_\-\/().:：\[\]{}]/g,'').toLowerCase();
  }
  function p4Field(obj, aliases){
    if(!obj) return '';
    const list = Array.isArray(aliases) ? aliases : [aliases];
    for(const k of list){
      if(Object.prototype.hasOwnProperty.call(obj,k)){
        const v = p4Clean(obj[k]);
        if(v) return v;
      }
    }
    const wants = list.map(p4CompactKey).filter(Boolean);
    for(const k of Object.keys(obj||{})){
      if(wants.includes(p4CompactKey(k))){
        const v = p4Clean(obj[k]);
        if(v) return v;
      }
    }
    return '';
  }
  function p4ExtractName(v){
    let s = p4Clean(v);
    if(!s) return '';
    s = s.replace(/^['"“”‘’]+|['"“”‘’]+$/g,'').trim();
    s = s.replace(/^(남편|아내|배우자|부인|처|남편명|아내명|배우자명)\s*[:：=\-]\s*/,'').trim();
    s = s.split(/[,;\n\r|/]+/).map(x=>x.trim()).filter(Boolean)[0] || s;
    return p4Clean(s);
  }
  function p4Canon(name){
    let s = p4ExtractName(name);
    if(!s) return '';
    s = s.replace(/\{[^{}]*\}/g,'');
    s = s.replace(/\[[^\[\]]*\]/g,'');
    s = s.replace(/\((?:남|여|남성|여성|남편|아내|배우자|부부|개인|\d{1,3}세|\d{1,3}살|\d{2,4}[.\-/]\d{1,2}(?:[.\-/]\d{1,2})?)\)/g,'');
    s = s.replace(/\s*(집사|권사|장로|목사|순장|성도|님)\s*$/g,'');
    s = s.replace(/[^0-9A-Za-z가-힣]/g,'');
    return s.trim();
  }
  function p4LooksName(v){
    const n = p4Canon(v);
    if(!n || n.length < 2 || n.length > 20) return false;
    if(['개인','부부','배우자','남편','아내','없음','무','해당없음'].includes(n)) return false;
    return /[A-Za-z가-힣]/.test(n);
  }
  function p4MemberName(m){
    if(typeof memberNameOf === 'function') return p4Clean(memberNameOf(m));
    return p4Field(m, ['name','이름','성명','순원이름','memberName']);
  }
  function p4MemberTeam(m){
    if(typeof memberTeamOf === 'function') return p4Clean(memberTeamOf(m));
    return p4Field(m, ['team','순','소속순','팀']);
  }
  function p4Active(m){
    if(typeof memberIsActive === 'function') return memberIsActive(m);
    return !(m && (m.active === 'N' || m.active === '보류'));
  }
  function p4List(){
    return (DATA && Array.isArray(DATA.members) ? DATA.members : []).filter(p4Active);
  }

  window.declaredSpouseNameOf = function(m){
    if(!m || typeof m !== 'object') return '';
    const raw = p4Field(m, ['spouseNameRaw','배우자명원본','declaredSpouseName']);
    if(p4LooksName(raw)) return p4ExtractName(raw);
    const direct = p4Field(m, ['배우자명','spouseName']);
    if(p4LooksName(direct)) return p4ExtractName(direct);
    return '';
  };
  window.spouseNameOf = function(m){ return window.declaredSpouseNameOf(m); };

  function p4FindById(id){
    if(!id) return null;
    const sid = String(id);
    return p4List().find(x => String(x.id) === sid || String(x.memberId || '') === sid) || null;
  }
  function p4FindByName(name, team, excludeId){
    const n = p4Canon(name);
    if(!n) return null;
    const t = p4Clean(team);
    const list = p4List().filter(x => String(x.id) !== String(excludeId));
    const sameTeam = list.find(x => p4Canon(p4MemberName(x)) === n && (!t || p4MemberTeam(x) === t));
    if(sameTeam) return sameTeam;
    const exact = list.filter(x => p4Canon(p4MemberName(x)) === n);
    if(exact.length === 1) return exact[0];
    return exact[0] || null;
  }
  function p4Link(a,b){
    if(!a || !b || String(a.id) === String(b.id)) return;
    FAMILY_LINK_BY_ID[String(a.id)] = b;
    FAMILY_LINK_BY_ID[String(b.id)] = a;
  }

  window.buildFamilyLinkIndex = function(){
    FAMILY_LINK_BY_ID = {};
    const list = p4List();
    const byIdDone = new Set();

    // 1) 서버가 순원목록 배우자명으로 계산한 spouseId 우선
    list.forEach(m => {
      const spouse = p4FindById(m.spouseId || m.spouseMemberId || m['배우자ID']);
      if(spouse){ p4Link(m, spouse); byIdDone.add(String(m.id)); byIdDone.add(String(spouse.id)); }
    });

    // 2) 순원목록 배우자명 직접값으로 연결
    list.forEach(m => {
      if(FAMILY_LINK_BY_ID[String(m.id)]) return;
      const declared = window.declaredSpouseNameOf(m);
      if(!declared) return;
      const spouse = p4FindByName(declared, p4MemberTeam(m), m.id);
      if(spouse) p4Link(m, spouse);
    });

    // 3) 역방향 연결: 나는 빈칸이어도 상대가 나를 배우자명으로 적으면 연결
    list.forEach(m => {
      if(FAMILY_LINK_BY_ID[String(m.id)]) return;
      const mine = p4Canon(p4MemberName(m));
      if(!mine) return;
      const sameTeamReverse = list.find(x => String(x.id)!==String(m.id) && p4MemberTeam(x) === p4MemberTeam(m) && p4Canon(window.declaredSpouseNameOf(x)) === mine);
      const anyReverse = sameTeamReverse || list.find(x => String(x.id)!==String(m.id) && p4Canon(window.declaredSpouseNameOf(x)) === mine);
      if(anyReverse) p4Link(m, anyReverse);
    });

    DATA.__familyLinksReady = true;
    DATA.__familyLinksStamp = list.map(m => String(m.id)).join('|') + '::' + list.length;
  };

  window.normalizeFamilyLinks = function(){
    if(!DATA || !Array.isArray(DATA.members)) return;
    DATA.__familyLinksReady = false;
    DATA.members.forEach(m => {
      if(!m) return;
      if(typeof memberNameOf === 'function') m.name = memberNameOf(m) || m.name || '';
      if(typeof memberTeamOf === 'function') m.team = memberTeamOf(m) || m.team || '';
      if(typeof memberGenderOf === 'function') m.gender = memberGenderOf(m) || m.gender || '';
      if(typeof memberBirthOf === 'function') m.birth = memberBirthOf(m) || m.birth || '';
      if(!m.spouseNameRaw) m.spouseNameRaw = window.declaredSpouseNameOf(m) || '';
    });
    window.buildFamilyLinkIndex();
    DATA.members.forEach(m => {
      const spouse = FAMILY_LINK_BY_ID[String(m.id)];
      if(spouse && typeof setSpouseNameFields === 'function') setSpouseNameFields(m, p4MemberName(spouse));
      else if(typeof setSpouseNameFields === 'function') setSpouseNameFields(m, window.declaredSpouseNameOf(m));
    });
  };

  window.v554EnsureFamilyLinks = function(){
    if(!DATA || !Array.isArray(DATA.members)) return;
    const list = p4List();
    const stamp = list.map(m => String(m.id)).join('|') + '::' + list.length;
    if(!DATA.__familyLinksReady || !FAMILY_LINK_BY_ID || DATA.__familyLinksStamp !== stamp){
      window.normalizeFamilyLinks();
    }
  };

  window.findSpouseFor = function(m){
    if(!m) return null;
    window.v554EnsureFamilyLinks();
    const linked = FAMILY_LINK_BY_ID && FAMILY_LINK_BY_ID[String(m.id)];
    if(linked && String(linked.id) !== String(m.id)) return linked;

    const byId = p4FindById(m.spouseId || m.spouseMemberId || m['배우자ID']);
    if(byId && String(byId.id)!==String(m.id)) return byId;

    const declared = window.declaredSpouseNameOf(m);
    if(declared){
      const direct = p4FindByName(declared, p4MemberTeam(m), m.id);
      if(direct) return direct;
    }
    const mine = p4Canon(p4MemberName(m));
    if(mine){
      return p4List().find(x => String(x.id)!==String(m.id) && p4MemberTeam(x) === p4MemberTeam(m) && p4Canon(window.declaredSpouseNameOf(x)) === mine) ||
             p4List().find(x => String(x.id)!==String(m.id) && p4Canon(window.declaredSpouseNameOf(x)) === mine) || null;
    }
    return null;
  };

  // 버튼 체감속도 보호: 렌더링 시 가족링크가 실패해도 매 클릭마다 전체 재계산하지 않게 한다.
  try{
    if(document && document.readyState !== 'loading'){
      const districtEl = document.getElementById('headerDistrict');
      if(districtEl) districtEl.innerHTML = '<span class="header-version-badge">' + P4_VERSION + '</span>';
    }
  }catch(e){}
})();
</script>



<script>

   목적:
   1) 정보수정/순원등록 저장 후 서버에서 순원목록을 다시 읽어 앱 화면을 갱신한다.

  const P5_CACHE_KEY = 'geolLeaderDataCacheV5_63';
  window.versionText = function(){ return P5_VERSION; };

  async function p5SaveMemberRecordChecked(payload){

  window.saveMemberUi = async function(id){

    try{
      const mainRes = await p5SaveMemberRecordChecked(payload);
      if(mainRes && mainRes.ok === false) throw new Error(mainRes.error || '순원 저장 실패');

      if(familyRole !== '개인' && spouseName){
        const existingSpouse = getMemberByName(spouseName, payload.team);
        const spousePayload = Object.assign({}, existingSpouse || {}, {
          id: existingSpouse ? existingSpouse.id : '',
          team: payload.team,
          name: spouseName,
          gender: spouseGenderByRole(familyRole) || (typeof spGender !== 'undefined' ? spGender.value : ''),
          birth: typeof spBirth !== 'undefined' ? spBirth.value : '',
          village: typeof spVillage !== 'undefined' ? spVillage.value : '',
          room: typeof spRoom !== 'undefined' ? spRoom.value : '',
          phone: joinPhoneParts(spPhone1.value, spPhone2.value, spPhone3.value),
          address: addressValue,
          photoUrl: typeof spPhotoUrl !== 'undefined' ? spPhotoUrl.value : '',
          memo: '',
          active:'Y'
        }, familyRole === '아내' ? childFieldsForOwner : emptyChildFields);
        setSpouseNameFields(spousePayload, payload.name);
        const spouseRes = await p5SaveMemberRecordChecked(spousePayload);
        if(spouseRes && spouseRes.ok === false) throw new Error(spouseRes.error || '배우자 저장 실패');

      await p5ReloadFreshDataAfterSave();

      state.tab='home';
      render();
      alert('저장되었습니다. 순원목록 시트 기준 최신 정보로 다시 불러왔습니다.');

      alert('저장 중 오류가 발생했습니다: '+(e.message||e));
    }finally{
      loadingToast.classList.add('hidden');
    }
  };
})();
</script>

   - 삭제 후 최신 순원목록을 재조회하여 앱에 반영

(function(){

<script>
/* V5.63 MEMBERLIST-ONLY SAVE HARD GUARD
   - 정보수정/신규등록 저장 액션을 saveMemberRecordDirectP16로 고정한다.
   - 서버 응답의 sheet가 순원목록이 아니면 성공 처리하지 않는다.
   - 배포된 Apps Script 버전이 P15이 아니면 저장을 중단해, 옛 서버가 순원수정/순원추가 시트를 만들지 못하게 한다.
*/
(function(){
  const P15_VERSION = 'V5.63';
  const P15_CACHE_KEY = 'geolLeaderDataCacheV5_63';
  try{ window.versionText = function(){ return P15_VERSION; }; }catch(e){}
  try{ window.dataCacheKey = function(){ return P15_CACHE_KEY; }; }catch(e){}

  function p7ParseResult(value){
    if(value == null) return {ok:true};
    if(typeof value === 'object') return value;
    try{ return JSON.parse(String(value)); }catch(e){ return {ok:true, value:value}; }
  }

  function p7IsP15Server(res){
    return !!(res && /(V5\.62P(1[6-9]|2[0-9])|V5\.63)/.test(String(res.version || '')));
  }

  async function p7AssertServerReady(){
    if(typeof call !== 'function') throw new Error('서버 호출 함수(call)를 찾을 수 없습니다.');
    // V5.63: 예전 서버에도 있는 debugStatus로 먼저 배포 버전을 확인한다.
    // 서버가 P15이 아니면 저장 요청을 보내지 않아, 예전 코드가 순원수정/순원추가 시트를 만들지 못하게 한다.
    const raw = await call('debugStatus');
    const res = p7ParseResult(raw);
    if(res && res.ok === false) throw new Error(res.error || '서버 연결 점검 실패');
    if(!p7IsP15Server(res)){
      throw new Error('Apps Script 서버 버전이 맞지 않습니다. 현재 서버: ' + (res && res.version ? res.version : '알 수 없음'));
    }
    return res;
  }

  function p7PayloadNeedsPost(payload){
    try{
      const s = JSON.stringify(payload || {});
      if(String((payload||{}).photoUrl||'').startsWith('data:image/')) return true;
      for(let i=1;i<=4;i++){
        if(String((payload||{})['child'+i+'Photo']||'').startsWith('data:image/')) return true;
      }
      return s.length > 3000;
    }catch(e){ return true; }
  }

  async function p7SaveMemberToMemberListOnly(payload){
    if(!payload || !String(payload.name||'').trim()) throw new Error('이름이 비어 있어 저장할 수 없습니다.');
    if(!String(payload.team||'').trim()) throw new Error('순을 선택해주세요.');

    // 저장 전 서버가 P15인지 확인한다. 옛 서버면 순원수정/순원추가 시트로 빠질 수 있으므로 저장 중단.
    await p7AssertServerReady();

    const action = 'saveMemberRecordDirectP26';
    if(!p7PayloadNeedsPost(payload) && typeof call === 'function'){
      const raw = await call(action, payload);
      const res = p7ParseResult(raw);
      if(res && res.ok === false) throw new Error(res.error || '순원목록 저장 실패');
      if(!p7IsP15Server(res)) throw new Error('저장 응답 서버 버전이 맞지 않습니다: ' + (res && res.version ? res.version : '알 수 없음'));
      if(res && res.sheet && res.sheet !== '순원목록') throw new Error('저장 대상 시트가 순원목록이 아닙니다: ' + res.sheet);
      return res || {ok:true, sheet:'순원목록'};
    }

    if(typeof callWrite !== 'function') throw new Error('POST 저장 함수(callWrite)를 찾을 수 없습니다.');
    await callWrite(action, payload);

    // POST는 iframe 방식이라 응답을 직접 읽기 어려우므로, 저장 직후 서버 상태를 재확인한다.
    await p7AssertServerReady();
    return {ok:true, sheet:'순원목록', post:true};
  }

  async function p7ReloadFreshData(){
    try{ localStorage.removeItem(P15_CACHE_KEY); }catch(e){}
    try{ if(typeof dataCacheKey === 'function') localStorage.removeItem(dataCacheKey()); }catch(e){}
    const raw = await call('getDataJson');
    const fresh = p7ParseResult(raw);
    if(!fresh || fresh.ok === false) throw new Error((fresh && fresh.error) || '최신 순원목록 데이터를 다시 불러오지 못했습니다.');
    if(!p7IsP15Server(fresh)){
      throw new Error('최신 데이터 응답 서버 버전이 맞지 않습니다: ' + (fresh && fresh.version ? fresh.version : '알 수 없음'));
    }
    if(typeof applyLoadedData === 'function'){
      applyLoadedData(fresh);
    }else{
      DATA = fresh;
      if(typeof normalizeFamilyLinks === 'function') normalizeFamilyLinks();
      if(typeof render === 'function') render();
    }
    return fresh;
  }

  window.saveMemberUi = async function(id){
    const children = collectChildrenPayload();
    const familyRole = typeof fmFamilyRole !== 'undefined' ? fmFamilyRole.value : '개인';
    const addressValue = combineAddress(fmZip.value,fmBaseAddress.value,fmDetailAddress.value);
    const childFieldsForOwner = childrenToFields(children);
    const emptyChildFields = childrenToFields([]);
    const payload = {
      id,
      team:fmTeam.value,
      name:fmName.value.trim(),
      gender:myGenderByRole(familyRole, fmGender.value),
      birth:fmBirth.value,
      village:fmVillage.value,
      room:fmRoom.value,
      phone:joinPhoneParts(fmPhone1.value,fmPhone2.value,fmPhone3.value),
      address:addressValue,
      childList:'',
      photoUrl:(typeof fmPhotoUrl!=='undefined'?fmPhotoUrl.value:''),
      memo:fmMemo.value,
      active:'Y'
    };
    Object.assign(payload, familyRole === '아내' ? emptyChildFields : childFieldsForOwner);

    const spouseName = familyRole === '개인' ? '' : (typeof spName !== 'undefined' ? spName.value.trim() : '');
    setSpouseNameFields(payload, spouseName);

    if(!payload.team) return alert('순을 선택해주세요.');
    if(!payload.name) return alert('이름을 입력해주세요.');
    if(familyRole !== '개인' && !spouseName) return alert(oppositeRole(familyRole)+' 이름을 입력해주세요.');

    loadingToast.classList.remove('hidden');
    try{
      const mainRes = await p7SaveMemberToMemberListOnly(payload);
      if(mainRes && mainRes.ok === false) throw new Error(mainRes.error || '순원 저장 실패');

      if(familyRole !== '개인' && spouseName){
        const existingSpouse = getMemberByName(spouseName, payload.team);
        const spousePayload = Object.assign({}, existingSpouse || {}, {
          id: existingSpouse ? existingSpouse.id : '',
          team: payload.team,
          name: spouseName,
          gender: spouseGenderByRole(familyRole) || (typeof spGender !== 'undefined' ? spGender.value : ''),
          birth: typeof spBirth !== 'undefined' ? spBirth.value : '',
          village: typeof spVillage !== 'undefined' ? spVillage.value : '',
          room: typeof spRoom !== 'undefined' ? spRoom.value : '',
          phone: joinPhoneParts(spPhone1.value, spPhone2.value, spPhone3.value),
          address: addressValue,
          photoUrl: typeof spPhotoUrl !== 'undefined' ? spPhotoUrl.value : '',
          memo: '',
          active:'Y'
        }, familyRole === '아내' ? childFieldsForOwner : emptyChildFields);
        setSpouseNameFields(spousePayload, payload.name);
        const spouseRes = await p7SaveMemberToMemberListOnly(spousePayload);
        if(spouseRes && spouseRes.ok === false) throw new Error(spouseRes.error || '배우자 저장 실패');
      }

      await p7ReloadFreshData();
      if(typeof normalizeFamilyLinks === 'function') normalizeFamilyLinks();
      state.tab='home';
      render();
      alert('저장되었습니다. [순원목록] 시트 기준 최신 정보로 다시 불러왔습니다.');
    }catch(e){
      alert('저장 중 오류가 발생했습니다: ' + (e.message || e));
    }finally{
      loadingToast.classList.add('hidden');
    }
  };
})();
</script>



<script>
/* V5.63 CHILDREN CHURCH ATTENDANCE TARGET PATCH
   - 자녀별 어린이결 출석 여부: 해당 / 미해당
   - 해당 자녀만 어린이결 출석 체크/통계에 포함
   - 미해당 자녀는 가족정보에는 유지하되 출석인원에서는 제외
*/
(function(){
  const P16_VERSION = 'V5.63';
  const P16_CACHE_KEY = 'geolLeaderDataCacheV5_63';
  try{ window.versionText = function(){ return P16_VERSION; }; }catch(e){}
  try{ window.dataCacheKey = function(){ return P16_CACHE_KEY; }; }catch(e){}

  const oldParseChildToken = typeof parseChildToken === 'function' ? parseChildToken : function(raw){ return {name:String(raw||'').trim(), birth:'', gender:'', photo:''}; };

  window.normalizeChildAttend = function(value){
    const s = String(value ?? '').replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
    if(!s) return '해당';
    const low = s.toLowerCase();
    if(s.includes('미') || s.includes('제외') || s.includes('안함') || s.includes('불참') || low==='n' || low==='no' || low==='false' || low==='0') return '미해당';
    return '해당';
  };

  window.isChildAttendanceEligible = function(child){
    if(!child || !stripChildNameText(child.name || '')) return false;
    return normalizeChildAttend(child.attend ?? child.childAttend ?? child.childrenChurch ?? child.어린이결 ?? child['어린이결출석'] ?? child['어린이결출석여부']) !== '미해당';
  };

  function childAttendFromMember(m, idx, fallback){
    const keys = [
      'child'+idx+'Attend','child'+idx+'Attendance','child'+idx+'ChildrenChurch','child'+idx+'KidChurch',
      '자녀'+idx+'어린이결','자녀'+idx+' 어린이결','자녀'+idx+'어린이결출석','자녀'+idx+' 어린이결 출석',
      '자녀'+idx+'출석대상','자녀'+idx+' 출석대상','자녀'+idx+'어린이결출석여부','자녀'+idx+' 어린이결 출석 여부'
    ];
    for(const k of keys){
      if(m && Object.prototype.hasOwnProperty.call(m,k) && String(m[k] ?? '').trim()) return normalizeChildAttend(m[k]);
    }
    return normalizeChildAttend(fallback && (fallback.attend ?? fallback.childAttend ?? fallback.childrenChurch));
  }

  window.parseChildren = function(m){
    const out=[];
    const parsedFromList=[];
    String((m&&m.childList)||'').split(',').forEach(raw=>{
      const p=oldParseChildToken(raw);
      if(p && stripChildNameText(p.name||'')) parsedFromList.push(p);
    });
    function add(name,birth,gender,photo,attend){
      const parsed=oldParseChildToken(name);
      const clean=stripChildNameText((parsed&&parsed.name)||name||'');
      if(!clean) return;
      out.push({
        name:clean,
        birth:birth || (parsed&&parsed.birth) || '',
        gender:gender || (parsed&&parsed.gender) || '',
        photo:photo || (parsed&&parsed.photo) || '',
        attend:normalizeChildAttend(attend)
      });
    }
    for(let i=1;i<=4;i++){
      const fallback=parsedFromList[i-1]||{};
      const name=(m&&m['child'+i]) || fallback.name || '';
      const attend=childAttendFromMember(m||{}, i, fallback);
      add(name, (m&&m['child'+i+'Birth']) || fallback.birth || '', (m&&m['child'+i+'Gender']) || fallback.gender || '', (m&&m['child'+i+'Photo']) || fallback.photo || '', attend);
    }
    parsedFromList.slice(4).forEach(p=>add(p.name,p.birth,p.gender,p.photo,p.attend));
    const seen={};
    return out.filter(c=>{
      const key=canonicalChildName(c.name);
      if(!key || seen[key]) return false;
      seen[key]=true;
      c.name=stripChildNameText(c.name);
      c.attend=normalizeChildAttend(c.attend);
      return true;
    });
  };

  window.childrenForAttendance = function(m){
    return (childrenForDisplay(m)||[]).filter(c=>isChildAttendanceEligible(c));
  };

  window.childDisplay = function(m){
    if(!shouldShowChildrenInList(m)) return '';
    return childrenForAttendance(m).map(c=>stripChildNameText(c.name)).filter(Boolean).join(', ');
  };

  window.shouldShowChildrenInList = function(m){
    if(!m) return false;
    const owner = typeof childOwnerFor === 'function' ? childOwnerFor(m) : m;
    return !!(owner && String(owner.id) === String(m.id) && childrenForAttendance(m).length > 0);
  };

  window.childrenToFields = function(children){
    const clean=[];
    const seen={};
    (children||[]).forEach(c=>{
      const name=stripChildNameText(c.name||'');
      const key=canonicalChildName(name);
      if(!key || seen[key]) return;
      seen[key]=true;
      clean.push({name, birth:c.birth||'', gender:c.gender||'', photo:c.photo||'', attend:normalizeChildAttend(c.attend)});
    });
    const row={childList:clean.map(c=>c.name+(c.birth?'('+c.birth+')':'')+(c.gender?'['+c.gender+']':'')).join(', ')};
    for(let i=1;i<=4;i++){
      const c=clean[i-1]||{};
      row['child'+i]=c.name||'';
      row['child'+i+'Birth']=c.birth||'';
      row['child'+i+'Gender']=c.gender||'';
      row['child'+i+'Photo']=c.photo||'';
      row['child'+i+'Attend']=c.name ? normalizeChildAttend(c.attend) : '';
    }
    return row;
  };

  window.collectChildrenPayload = function(){
    const list = Array.from(document.querySelectorAll('#childListBox .child-row')).map(row=>({
      name:stripChildNameText(row.querySelector('.child-name')?.value.trim()||''),
      birth:row.querySelector('.child-birth')?.value.trim()||'',
      gender:row.querySelector('.child-gender')?.value||'',
      attend:normalizeChildAttend(row.querySelector('.child-attend')?.value||'해당'),
      photo:row.querySelector('.child-photo-url')?.value.trim()||''
    })).filter(c=>c.name);
    const seen={};
    const out=[];
    list.forEach(c=>{
      const key=canonicalChildName(c.name);
      if(!key) return;
      if(seen[key]){
        const prev=seen[key];
        if(!prev.birth && c.birth) prev.birth=c.birth;
        if(!prev.gender && c.gender) prev.gender=c.gender;
        if(!prev.photo && c.photo) prev.photo=c.photo;
        if(prev.attend!=='미해당' && c.attend==='미해당') prev.attend='미해당';
        return;
      }
      seen[key]=c;
      out.push(c);
    });
    return out;
  };

  window.collectChildList = function(){

          const open=f.id?`onclick="openMemberDetail('${esc(f.id)}')"`:(isChild?`onclick="openChildDetail('${esc(m.id)}','${esc(f.name)}')"`:'');

          </div>`;
        }).join('')}
      </div>
    </div>`;
  };

  function p16ParseResult(value){
    if(value == null) return {ok:true};
    if(typeof value === 'object') return value;
    try{ return JSON.parse(String(value)); }catch(e){ return {ok:true, value:value}; }
  }
  function p16IsServer(res){ return !!(res && /(V5\.62P(1[6-9]|2[0-9])|V5\.63)/.test(String(res.version || ''))); }
  async function p16AssertServerReady(){
    const raw = await call('debugStatus');
    const res = p16ParseResult(raw);
    if(res && res.ok === false) throw new Error(res.error || '서버 연결 점검 실패');
    if(!p16IsServer(res)) throw new Error('Apps Script가 아직 V5.63으로 배포되지 않았습니다. Code.gs 전체 교체 후 기존 웹앱 배포를 [새 버전]으로 업데이트해주세요. 현재 서버: ' + (res && res.version ? res.version : '알 수 없음'));
    return res;
  }
  function p16PayloadNeedsPost(payload){
    try{
      const s=JSON.stringify(payload||{});
      if(String((payload||{}).photoUrl||'').startsWith('data:image/')) return true;
      for(let i=1;i<=4;i++) if(String((payload||{})['child'+i+'Photo']||'').startsWith('data:image/')) return true;
      return s.length>3000;
    }catch(e){ return true; }
  }
  async function p16SaveMemberToMemberListOnly(payload){
    if(!payload || !String(payload.name||'').trim()) throw new Error('이름이 비어 있어 저장할 수 없습니다.');
    if(!String(payload.team||'').trim()) throw new Error('순을 선택해주세요.');
    await p16AssertServerReady();
    const action='saveMemberRecordDirectP26';
    if(!p16PayloadNeedsPost(payload) && typeof call === 'function'){
      const raw=await call(action,payload);
      const res=p16ParseResult(raw);
      if(res && res.ok===false) throw new Error(res.error || '순원목록 저장 실패');
      if(!p16IsServer(res)) throw new Error('저장 응답 서버 버전이 P16이 아닙니다: ' + (res&&res.version?res.version:'알 수 없음'));
      if(res && res.sheet && res.sheet!=='순원목록') throw new Error('저장 대상 시트가 순원목록이 아닙니다: '+res.sheet);
      return res || {ok:true,sheet:'순원목록'};
    }
    if(typeof callWrite !== 'function') throw new Error('POST 저장 함수(callWrite)를 찾을 수 없습니다.');
    await callWrite(action,payload);
    await p16AssertServerReady();
    return {ok:true,sheet:'순원목록',post:true};
  }
  async function p16ReloadFreshData(){
    try{ localStorage.removeItem(P16_CACHE_KEY); }catch(e){}
    try{ if(typeof dataCacheKey==='function') localStorage.removeItem(dataCacheKey()); }catch(e){}
    const raw=await call('getDataJson');
    const fresh=p16ParseResult(raw);
    if(!fresh || fresh.ok===false) throw new Error((fresh&&fresh.error)||'최신 순원목록 데이터를 다시 불러오지 못했습니다.');
    if(!p16IsServer(fresh)) throw new Error('최신 데이터 응답 서버가 P16이 아닙니다: '+(fresh&&fresh.version?fresh.version:'알 수 없음'));
    if(typeof applyLoadedData==='function') applyLoadedData(fresh);
    else{ DATA=fresh; if(typeof normalizeFamilyLinks==='function') normalizeFamilyLinks(); if(typeof render==='function') render(); }
    return fresh;
  }

  window.saveMemberUi = async function(id){
    const children=collectChildrenPayload();
    const familyRole = typeof fmFamilyRole !== 'undefined' ? fmFamilyRole.value : '개인';
    const addressValue = combineAddress(fmZip.value,fmBaseAddress.value,fmDetailAddress.value);
    const childFieldsForOwner = childrenToFields(children);
    const emptyChildFields = childrenToFields([]);
    const payload={
      id,
      team:fmTeam.value,
      name:fmName.value.trim(),
      gender:myGenderByRole(familyRole, fmGender.value),
      birth:fmBirth.value,
      village:fmVillage.value,
      room:fmRoom.value,
      phone:joinPhoneParts(fmPhone1.value,fmPhone2.value,fmPhone3.value),
      address:addressValue,
      childList:'',
      photoUrl:(typeof fmPhotoUrl!=='undefined'?fmPhotoUrl.value:''),
      memo:fmMemo.value,
      active:'Y'
    };
    Object.assign(payload, familyRole === '아내' ? emptyChildFields : childFieldsForOwner);
    const spouseName = familyRole === '개인' ? '' : (typeof spName !== 'undefined' ? spName.value.trim() : '');
    setSpouseNameFields(payload, spouseName);
    if(!payload.team) return alert('순을 선택해주세요.');
    if(!payload.name) return alert('이름을 입력해주세요.');
    if(familyRole !== '개인' && !spouseName) return alert(oppositeRole(familyRole)+' 이름을 입력해주세요.');
    loadingToast.classList.remove('hidden');
    try{
      const mainRes=await p16SaveMemberToMemberListOnly(payload);
      if(mainRes && mainRes.ok===false) throw new Error(mainRes.error || '순원 저장 실패');
      if(familyRole !== '개인' && spouseName){
        const existingSpouse=getMemberByName(spouseName,payload.team);
        const spousePayload=Object.assign({}, existingSpouse || {}, {
          id:existingSpouse?existingSpouse.id:'', team:payload.team, name:spouseName,
          gender:spouseGenderByRole(familyRole) || (typeof spGender!=='undefined'?spGender.value:''),
          birth:typeof spBirth!=='undefined'?spBirth.value:'',
          village:typeof spVillage!=='undefined'?spVillage.value:'',
          room:typeof spRoom!=='undefined'?spRoom.value:'',
          phone:joinPhoneParts(spPhone1.value,spPhone2.value,spPhone3.value),
          address:addressValue,
          photoUrl:typeof spPhotoUrl!=='undefined'?spPhotoUrl.value:'',
          memo:'', active:'Y'
        }, familyRole === '아내' ? childFieldsForOwner : emptyChildFields);
        setSpouseNameFields(spousePayload,payload.name);
        const spouseRes=await p16SaveMemberToMemberListOnly(spousePayload);
        if(spouseRes && spouseRes.ok===false) throw new Error(spouseRes.error || '배우자 저장 실패');
      }
      await p16ReloadFreshData();
      if(typeof normalizeFamilyLinks==='function') normalizeFamilyLinks();
      state.tab='home';
      render();
      alert('저장되었습니다. 어린이결 출석 여부가 순원목록에 반영되었습니다.');
    }catch(e){
      alert('저장 중 오류가 발생했습니다: '+(e.message||e));
    }finally{
      loadingToast.classList.add('hidden');
    }
  };

  try{
    const style=document.createElement('style');
    style.textContent=`
      .pretty-child-row{grid-template-columns:48px minmax(0,1fr) minmax(0,1fr) 72px 116px 68px 42px!important;gap:8px!important;align-items:center!important}
      .child-attend{font-weight:900;color:#4b3b89;background:#fffdf6!important;border-color:#eadfff!important}
      .child-attend-badge{min-width:42px;padding:8px 6px;border-radius:13px;background:#eefaf6;color:#168866;font-weight:900;font-size:12px;text-align:center;border:1px solid #c9efe3}
      @media(max-width:430px){.pretty-child-row{grid-template-columns:48px 1fr!important}.child-age-box,.child-remove,.child-attend{min-height:42px}}
    `;
    document.head.appendChild(style);
  }catch(e){}
})();

<script>
/* V5.63 child layout / address split / team permission / save sync patch */
(function(){
  const P18_VERSION = 'V5.63';
  const P18_CACHE_KEY = 'geolLeaderDataCacheV5_63';
  try{ window.versionText = function(){ return P18_VERSION; }; }catch(e){}
  try{ window.dataCacheKey = function(){ return P18_CACHE_KEY; }; }catch(e){}

  function p18CleanName(v){
    return String(v||'').replace(/\s/g,'').replace(/(집사|권사|장로|목사|전도사|순장|성도|님)$/g,'').trim();
  }
  function p18Profile(){
    try{
      if(typeof getLocalProfile === 'function'){
        const p = getLocalProfile() || {};
        if(p.leaderName || p.leaderRole || p.leaderTeam) return p;
      }
    }catch(e){}
    const s = (window.DATA && DATA.settings) || {};
    return {leaderName:s.leaderName||'', leaderTeam:s.leaderTeam||'', leaderRole:s.leaderRole||''};
  }
  function p18IsSuperProfile(p){
    p = p || p18Profile();
    const role = String(p.leaderRole || '').trim();
    const name = p18CleanName(p.leaderName || '');
    return ['관리자','부관리자','목회자','위원장','임원'].includes(role) || name === '김건일';
  }
  function p18LeaderTeam(p){
    p = p || p18Profile();
    return String(p.leaderTeam || '').trim();
  }
  function p18CanManageTeam(team){
    const p = p18Profile();
    if(p18IsSuperProfile(p)) return true;
    const myTeam = p18LeaderTeam(p);
    return !!myTeam && String(team || '').trim() === myTeam;
  }
  function p18CanManageMember(m){
    return !!m && p18CanManageTeam(m.team);
  }
  function p18WarnNoPermission(){
    alert('권한이 없습니다. 순장은 본인 순만 출석체크/정보수정할 수 있습니다. 전체 권한은 관리자/부관리자/목회자/위원장/임원에게만 있습니다.');
  }
  window.p18CanManageTeam = p18CanManageTeam;
  window.p18CanManageMember = p18CanManageMember;

  // 주소는 기본주소와 추가주소를 | 구분자로 저장해 재진입 시 다시 분리한다.
  window.splitAddressParts = function(address){
    const s = String(address || '').trim();
    if(!s) return {zip:'', base:'', detail:''};
    const zipMatch = s.match(/^(\d{5,6})\s+(.*)$/);
    let zip = '', rest = s;
    if(zipMatch){ zip = zipMatch[1]; rest = zipMatch[2] || ''; }
    const pipeParts = rest.split('|').map(x=>x.trim());
    if(pipeParts.length >= 2){
      return {zip, base:pipeParts[0] || '', detail:pipeParts.slice(1).join(' ').trim()};
    }
    // 과거 저장값 중 '  ' 이 있는 경우만 추가주소로 분리하고, 일반 한 칸 공백은 기본주소로 유지한다.
    const dbl = rest.split(/\s{2,}/).map(x=>x.trim()).filter(Boolean);
    if(dbl.length >= 2) return {zip, base:dbl[0], detail:dbl.slice(1).join(' ')};
    return {zip, base:rest, detail:''};
  };
  window.combineAddress = function(zip, base, detail){
    zip = String(zip||'').trim();
    base = String(base||'').trim();
    detail = String(detail||'').trim();
    const head = [zip, base].filter(Boolean).join(' ');
    return detail ? (head ? head + ' | ' + detail : detail) : head;
  };

  // 비관리자는 본인 순만 선택/표시한다. 관리자/부관리자/목회자/위원장/임원은 전체 선택 가능.
  const oldTeamMembers = typeof teamMembers === 'function' ? teamMembers : null;
  window.teamMembers = function(){
    const p = p18Profile();
    if(!p18IsSuperProfile(p)){
      const myTeam = p18LeaderTeam(p);
      if(myTeam && state.team !== myTeam) state.team = myTeam;
      return safeArr(DATA.members).filter(m => String(m.team) === String(myTeam) && m.active !== 'N' && m.active !== '보류');
    }
    return oldTeamMembers ? oldTeamMembers() : safeArr(DATA.members).filter(m => !state.team || state.team==='전체' || String(m.team)===String(state.team));
  };
  window.teamSelect = function(){
    const p = p18Profile();
    const teams = safeArr(DATA.teams);
    if(!p18IsSuperProfile(p)){
      const myTeam = p18LeaderTeam(p);
      if(myTeam && state.team !== myTeam) state.team = myTeam;
      return `<select class="input aurora-select" disabled><option value="${esc(myTeam)}" selected>${esc(myTeam || '순을 선택해주세요')}</option></select>`;
    }
    return `<select class="input aurora-select" onchange="state.team=this.value;render()">
      <option value="" ${!state.team?'selected':''}>순을 선택해주세요</option>
      <option value="전체" ${state.team==='전체'?'selected':''}>전체</option>
      ${teams.map(t=>`<option value="${esc(t)}" ${state.team===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select>`;
  };

  const oldOpenMemberForm = typeof openMemberForm === 'function' ? openMemberForm : null;
  window.openMemberForm = function(id=''){
    if(id){
      const m = safeArr(DATA.members).find(x => String(x.id) === String(id));
      if(m && !p18CanManageMember(m)){ p18WarnNoPermission(); return; }
    }else if(!p18IsSuperProfile(p18Profile())){
      const myTeam = p18LeaderTeam();
      if(myTeam) state.team = myTeam;
    }
    if(oldOpenMemberForm) return oldOpenMemberForm(id);
  };

  const oldOpenMemberDetail = typeof openMemberDetail === 'function' ? openMemberDetail : null;
  window.openMemberDetail = function(id){
    const m = safeArr(DATA.members).find(x => String(x.id) === String(id));
    if(m && !p18CanManageMember(m)){
      // 보기 자체는 허용할 수도 있지만, 다른 순 정보수정 방지를 위해 상세 진입을 차단한다.
      p18WarnNoPermission();
      return;
    }
    if(oldOpenMemberDetail) return oldOpenMemberDetail(id);
  };

  const oldToggleAttend = typeof toggleAttend === 'function' ? toggleAttend : null;
  window.toggleAttend = async function(id){
    const m = safeArr(DATA.members).find(x => String(x.id) === String(id));
    if(m && !p18CanManageMember(m)){ p18WarnNoPermission(); return; }
    return oldToggleAttend ? oldToggleAttend(id) : undefined;
  };
  const oldToggleChild = typeof toggleChild === 'function' ? toggleChild : null;
  window.toggleChild = async function(parentId, childName, childBirth){
    const m = safeArr(DATA.members).find(x => String(x.id) === String(parentId));
    if(m && !p18CanManageMember(m)){ p18WarnNoPermission(); return; }
    return oldToggleChild ? oldToggleChild(parentId, childName, childBirth) : undefined;
  };

  function p18ParseResult(value){
    if(value == null) return {ok:true};
    if(typeof value === 'object') return value;
    try{ return JSON.parse(String(value)); }catch(e){ return {ok:true, value:value}; }
  }
  function p18IsServer(res){ return !!(res && /(V5\.62P(1[6-9]|2[0-9])|V5\.63)/.test(String(res.version || ''))); }
  async function p18AssertServerReady(){
    const raw = await call('debugStatus');
    const res = p18ParseResult(raw);
    if(res && res.ok === false) throw new Error(res.error || '서버 연결 점검 실패');
    if(!p18IsServer(res)) throw new Error('Apps Script가 아직 V5.63로 배포되지 않았습니다. Code.gs 전체 교체 후 기존 웹앱 배포를 [새 버전]으로 업데이트해주세요. 현재 서버: ' + (res && res.version ? res.version : '알 수 없음'));
    return res;
  }
  function p18PayloadNeedsPost(payload){
    try{
      const s=JSON.stringify(payload||{});
      if(String((payload||{}).photoUrl||'').startsWith('data:image/')) return true;
      for(let i=1;i<=4;i++) if(String((payload||{})['child'+i+'Photo']||'').startsWith('data:image/')) return true;
      return s.length>3000;
    }catch(e){ return true; }
  }
  async function p18SaveMemberToMemberListOnly(payload){
    if(!payload || !String(payload.name||'').trim()) throw new Error('이름이 비어 있어 저장할 수 없습니다.');
    if(!String(payload.team||'').trim()) throw new Error('순을 선택해주세요.');
    if(!p18CanManageTeam(payload.team)) throw new Error('권한이 없습니다. 본인 순의 순원만 저장할 수 있습니다.');
    const p = p18Profile();
    payload.editorName = p.leaderName || '';
    payload.editorTeam = p.leaderTeam || '';
    payload.editorRole = p.leaderRole || '';
    await p18AssertServerReady();
    const action='saveMemberRecordDirectP26';
    if(!p18PayloadNeedsPost(payload) && typeof call === 'function'){
      const raw=await call(action,payload);
      const res=p18ParseResult(raw);
      if(res && res.ok===false) throw new Error(res.error || '순원목록 저장 실패');
      if(!p18IsServer(res)) throw new Error('저장 응답 서버 버전이 P18이 아닙니다: ' + (res&&res.version?res.version:'알 수 없음'));
      if(res && res.sheet && res.sheet!=='순원목록') throw new Error('저장 대상 시트가 순원목록이 아닙니다: '+res.sheet);
      return res || {ok:true,sheet:'순원목록'};
    }
    if(typeof callWrite !== 'function') throw new Error('POST 저장 함수(callWrite)를 찾을 수 없습니다.');
    await callWrite(action,payload);
    await p18AssertServerReady();
    return {ok:true,sheet:'순원목록',post:true};
  }
  async function p18ReloadFreshData(){
    try{ localStorage.removeItem(P18_CACHE_KEY); }catch(e){}
    try{ if(typeof dataCacheKey==='function') localStorage.removeItem(dataCacheKey()); }catch(e){}
    const raw=await call('getDataJson');
    const fresh=p18ParseResult(raw);
    if(!fresh || fresh.ok===false) throw new Error((fresh&&fresh.error)||'최신 순원목록 데이터를 다시 불러오지 못했습니다.');
    if(!p18IsServer(fresh)) throw new Error('최신 데이터 응답 서버가 P18이 아닙니다: '+(fresh&&fresh.version?fresh.version:'알 수 없음'));
    if(typeof applyLoadedData==='function') applyLoadedData(fresh);
    else{ DATA=fresh; if(typeof normalizeFamilyLinks==='function') normalizeFamilyLinks(); if(typeof render==='function') render(); }
    return fresh;
  }

  window.saveMemberUi = async function(id){
    const children=collectChildrenPayload();
    const familyRole = typeof fmFamilyRole !== 'undefined' ? fmFamilyRole.value : '개인';
    const addressValue = combineAddress(fmZip.value,fmBaseAddress.value,fmDetailAddress.value);
    const childFieldsForOwner = childrenToFields(children);
    const emptyChildFields = childrenToFields([]);
    const payload={
      id,
      team:fmTeam.value,
      name:fmName.value.trim(),
      gender:myGenderByRole(familyRole, fmGender.value),
      birth:fmBirth.value,
      village:fmVillage.value,
      room:fmRoom.value,
      phone:joinPhoneParts(fmPhone1.value,fmPhone2.value,fmPhone3.value),
      address:addressValue,
      childList:'',
      photoUrl:(typeof fmPhotoUrl!=='undefined'?fmPhotoUrl.value:''),
      memo:fmMemo.value,
      active:'Y'
    };
    Object.assign(payload, familyRole === '아내' ? emptyChildFields : childFieldsForOwner);
    const spouseName = familyRole === '개인' ? '' : (typeof spName !== 'undefined' ? spName.value.trim() : '');
    setSpouseNameFields(payload, spouseName);
    if(!payload.team) return alert('순을 선택해주세요.');
    if(!payload.name) return alert('이름을 입력해주세요.');
    if(!p18CanManageTeam(payload.team)) return p18WarnNoPermission();
    if(familyRole !== '개인' && !spouseName) return alert(oppositeRole(familyRole)+' 이름을 입력해주세요.');
    loadingToast.classList.remove('hidden');
    try{
      const mainRes=await p18SaveMemberToMemberListOnly(payload);
      if(mainRes && mainRes.ok===false) throw new Error(mainRes.error || '순원 저장 실패');
      if(familyRole !== '개인' && spouseName){
        const existingSpouse=getMemberByName(spouseName,payload.team);
        const spousePayload=Object.assign({}, existingSpouse || {}, {
          id:existingSpouse?existingSpouse.id:'', team:payload.team, name:spouseName,
          gender:spouseGenderByRole(familyRole) || (typeof spGender!=='undefined'?spGender.value:''),
          birth:typeof spBirth!=='undefined'?spBirth.value:'',
          village:typeof spVillage!=='undefined'?spVillage.value:'',
          room:typeof spRoom!=='undefined'?spRoom.value:'',
          phone:joinPhoneParts(spPhone1.value,spPhone2.value,spPhone3.value),
          address:addressValue,
          photoUrl:typeof spPhotoUrl!=='undefined'?spPhotoUrl.value:'',
          memo:'', active:'Y'
        }, familyRole === '아내' ? childFieldsForOwner : emptyChildFields);
        setSpouseNameFields(spousePayload,payload.name);
        const spouseRes=await p18SaveMemberToMemberListOnly(spousePayload);
        if(spouseRes && spouseRes.ok===false) throw new Error(spouseRes.error || '배우자 저장 실패');
      }
      await p18ReloadFreshData();
      if(typeof normalizeFamilyLinks==='function') normalizeFamilyLinks();
      state.tab='home';
      render();
      alert('저장되었습니다.');
    }catch(e){
      alert('저장 중 오류가 발생했습니다: '+(e.message||e));
    }finally{
      loadingToast.classList.add('hidden');
    }
  };

  try{
    const style=document.createElement('style');
    style.textContent=`
      #childListBox .pretty-child-row.child-edit-row{
        display:grid!important;
        grid-template-columns:44px minmax(0,1fr) 82px!important;
        grid-template-areas:"photo name name" "photo birth gender" "remove attend age"!important;
